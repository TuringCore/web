<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lorenz Attractor</title>
    <meta name="description" content="A fullscreen stylized Lorenz attractor." />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #020617;
      }

      body {
        min-height: 100dvh;
        position: relative;
        touch-action: manipulation;
        background:
          radial-gradient(circle at 18% 20%, rgba(56, 189, 248, 0.12), transparent 28%),
          radial-gradient(circle at 82% 24%, rgba(236, 72, 153, 0.1), transparent 30%),
          radial-gradient(circle at 50% 82%, rgba(99, 102, 241, 0.14), transparent 38%),
          #020617;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0) 18%),
          radial-gradient(circle at center, rgba(15, 23, 42, 0) 42%, rgba(2, 6, 23, 0.75) 100%);
      }

      body::after {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0));
        mix-blend-mode: screen;
      }

      main {
        width: 100%;
        height: 100%;
      }

      #attractor {
        display: block;
        width: 100vw;
        height: 100dvh;
      }

      .attribution {
        position: fixed;
        right: max(10px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 3;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.5);
        color: rgba(226, 232, 240, 0.9);
        font-family: "Segoe UI", Inter, system-ui, -apple-system, sans-serif;
        font-size: clamp(0.7rem, 1.8vw, 0.8rem);
        line-height: 1;
        letter-spacing: 0.015em;
        backdrop-filter: blur(4px);
      }

      .attribution a {
        color: #bfdbfe;
        text-decoration: none;
      }

      .attribution a:hover,
      .attribution a:focus-visible {
        text-decoration: underline;
      }

      @supports not (height: 100dvh) {
        #attractor {
          height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Fullscreen Lorenz attractor experience">
      <canvas id="attractor" aria-label="Animated Lorenz attractor"></canvas>
    </main>
    <div class="attribution">
      Made with ❤️ by
      <a href="https://github.com/TuringCore" target="_blank" rel="noopener noreferrer">TuringCore</a>
    </div>

    <script src="./lorenz.js"></script>
  </body>
</html>
